<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>АНАСТАСИЯ · нежная динамика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #faf3f0;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* общие половинки с мобильной оптимизацией */
        .half {
            min-height: 100vh;  /* fallback */
            min-height: 100dvh;  /* modern dynamic viewport */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background-color 0.6s ease;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ========== ВЕРХНЯЯ ПОЛОВИНА — нежный персик/пыль ========= */
        .peach-half {
            background: linear-gradient(145deg, #fff1eb 0%, #fad9cf 100%);
            color: #4a3b36;
        }

        .peach-half::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, rgba(255, 230, 210, 0.5) 0%, transparent 60%),
                        repeating-linear-gradient(45deg, rgba(255,230,210,0.2) 0px, rgba(255,230,210,0.2) 20px, transparent 20px, transparent 40px);
            pointer-events: none;
            animation: softShimmer 14s infinite alternate;
        }

        @keyframes softShimmer {
            0% { opacity: 0.2; background-position: 0 0; }
            50% { opacity: 0.6; background-position: 40px 40px; }
            100% { opacity: 0.2; background-position: 80px 0; }
        }

        /* ========== НИЖНЯЯ ПОЛОВИНА — нежная мята/аква ========= */
        .mint-half {
            background: linear-gradient(145deg, #e0f2f1 0%, #c8e6e0 100%);
            color: #2b5e5a;
        }

        .mint-half::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 80% 30%, rgba(190, 240, 230, 0.5) 0%, transparent 60%),
                        repeating-linear-gradient(135deg, rgba(190,240,230,0.2) 0px, rgba(190,240,230,0.2) 20px, transparent 20px, transparent 40px);
            pointer-events: none;
            animation: softDrift 16s infinite alternate;
        }

        @keyframes softDrift {
            0% { opacity: 0.2; background-position: 0 0; }
            50% { opacity: 0.6; background-position: -30px 30px; }
            100% { opacity: 0.2; background-position: 0 60px; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem;  /* уменьшены отступы для мобильных */
            position: relative;
            z-index: 10;
            width: 100%;
        }

        /* адаптивная типографика */
        .peach-title {
            font-size: clamp(2.2rem, 12vw, 5rem);  /* более отзывчиво */
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #6d4c41;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 10px rgba(255, 215, 190, 0.8), 0 0 30px #ffcdb0;
            animation: floatWord 5s ease-in-out infinite, softGlow 4s alternate infinite;
            word-break: break-word;
            line-height: 1.2;
        }

        .peach-wave {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            font-weight: 200;
            color: #aa7e6a;
            margin-bottom: 1.5rem;
            padding-left: 1.2rem;
            border-left: 2px solid #dbb6a2;
            animation: gentleSlide 6s infinite, colorPeach 7s infinite;
        }

        @keyframes gentleSlide {
            0% { padding-left: 1.2rem; border-left-width: 2px; }
            50% { padding-left: 2rem; border-left-width: 4px; border-left-color: #f0a07c; }
            100% { padding-left: 1.2rem; border-left-width: 2px; }
        }

        @keyframes colorPeach {
            0%, 100% { color: #aa7e6a; }
            33% { color: #b68973; }
            66% { color: #9d6f5a; }
        }

        .mint-title {
            font-size: clamp(2.2rem, 12vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.1em;
            color: #1d6f6b;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 15px #b0e0dd, 0 0 40px #9ad4d0;
            animation: sway 6s infinite alternate, breathe 4s infinite;
            line-height: 1.2;
        }

        .mint-sub {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 200;
            color: #3c8d87;
            font-style: italic;
            margin-bottom: 2rem;
            padding: 0 0.5rem 0.5rem;
            border-bottom: 1px dashed #8ec9c2;
            display: inline-block;
            animation: borderPulse 5s infinite alternate, shiftColor 8s infinite;
            word-break: break-word;
        }

        @keyframes borderPulse {
            0% { border-bottom-color: #8ec9c2; }
            50% { border-bottom-color: #c3ede8; border-bottom-width: 3px; }
            100% { border-bottom-color: #8ec9c2; }
        }

        @keyframes shiftColor {
            0% { color: #3c8d87; }
            50% { color: #57aca4; }
            100% { color: #3c8d87; }
        }

        @keyframes floatWord {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.01); }  /* меньше движение */
            100% { transform: translateY(0) scale(1); }
        }

        @keyframes softGlow {
            0% { text-shadow: 0 0 8px #ffdcc4, 0 0 25px #fccbb0; }
            100% { text-shadow: 0 0 15px #ffc4a7, 0 0 40px #f8b595; }
        }

        @keyframes sway {
            0% { transform: rotate(0deg); }
            33% { transform: rotate(0.5deg); }
            66% { transform: rotate(-0.5deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes breathe {
            0% { letter-spacing: 0.1em; filter: brightness(1); }
            50% { letter-spacing: 0.15em; filter: brightness(1.08); }
            100% { letter-spacing: 0.1em; filter: brightness(1); }
        }

        /* ---------- СЕТКА ФОТО — АДАПТИВНАЯ ---------- */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);  /* всегда 2 колонки на мобильных и выше */
            gap: 12px;  /* уменьшенный отступ на маленьких */
            margin: 1.5rem 0;
        }

        @media (min-width: 480px) {
            .photo-grid {
                gap: 20px;
            }
        }

        @media (min-width: 768px) {
            .photo-grid {
                gap: 30px;
            }
        }

        /* ======== рамки для верхней (персик) ======= */
        .peach-frame {
            aspect-ratio: 3/4;
            background: #edd7cd;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 25px -10px rgba(150, 100, 70, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.7) inset;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            animation: frameFloat 6s infinite alternate, softShadow 8s infinite;
            will-change: transform, box-shadow;  /* оптимизация */
        }

        .peach-frame:nth-child(1) { animation-delay: 0s; }
        .peach-frame:nth-child(2) { animation-delay: 0.8s; }
        .peach-frame:nth-child(3) { animation-delay: 1.5s; }
        .peach-frame:nth-child(4) { animation-delay: 2.2s; }

        @keyframes frameFloat {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-8px) scale(1.01); }  /* уменьшил для батареи/плавности */
        }

        @keyframes softShadow {
            0% { box-shadow: 0 15px 25px -10px rgba(150,100,70,0.15), 0 0 0 1px rgba(255,240,230,0.7) inset; }
            50% { box-shadow: 0 22px 32px -8px rgba(170, 120, 80, 0.25), 0 0 0 2px rgba(255,250,240,0.5) inset; }
            100% { box-shadow: 0 15px 25px -10px rgba(150,100,70,0.15), 0 0 0 1px rgba(255,240,230,0.7) inset; }
        }

        /* ======== рамки для нижней (мята) ======= */
        .mint-frame {
            aspect-ratio: 3/4;
            background: #cde3df;
            border-radius: 30% 20% 30% 20%;
            overflow: hidden;
            box-shadow: 0 15px 25px -15px #477a74, 0 0 0 2px #effbf9 inset;
            transition: all 0.5s ease;
            animation: mintWave 7s infinite alternate, borderRadiusShift 9s infinite;
            will-change: transform, border-radius;
        }

        .mint-frame:nth-child(1) { animation-delay: 0.2s; }
        .mint-frame:nth-child(2) { animation-delay: 0.9s; }
        .mint-frame:nth-child(3) { animation-delay: 1.8s; }
        .mint-frame:nth-child(4) { animation-delay: 2.7s; }

        @keyframes mintWave {
            0% { transform: translateY(0) scale(1); border-radius: 30% 20% 30% 20%; }
            50% { transform: translateY(-6px) scale(1.01); border-radius: 35% 25% 35% 25%; box-shadow: 0 28px 30px -15px #2f7068; }
            100% { transform: translateY(0) scale(1); border-radius: 30% 20% 30% 20%; }
        }

        @keyframes borderRadiusShift {
            0% { border-radius: 30% 20% 30% 20%; }
            33% { border-radius: 35% 25% 25% 35%; }
            66% { border-radius: 25% 35% 35% 25%; }
            100% { border-radius: 30% 20% 30% 20%; }
        }

        /* общее для изображений */
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
            backface-visibility: hidden;  /* улучшение производительности */
        }

        /* убираем сильное увеличение на тач-устройствах, оставляем лёгкое */
        .photo-frame:hover img,
        .photo-frame:active img {
            transform: scale(1.05);
        }

        /* отключаем hover-эффекты на тач-устройствах, но оставляем активное состояние */
        @media (hover: hover) {
            .photo-frame:hover img {
                transform: scale(1.1);
                filter: brightness(1.05) contrast(1.05);
            }
            .peach-frame:hover {
                border-radius: 12px;
                box-shadow: 0 40px 50px -12px #b29582;
            }
            .mint-frame:hover {
                border-radius: 40% 20% 40% 20% / 30% 40% 20% 40%;
                box-shadow: 0 40px 50px -15px #21635e;
            }
        }

        /* на тач-устройствах легкое нажатие */
        .photo-frame:active {
            transform: scale(0.98);
            transition: transform 0.2s;
        }

        /* футеры */
        .footer {
            margin-top: 2rem;
            padding: 1.2rem 0;
            display: flex;
            flex-wrap: wrap;  /* чтобы на узких экранах не ломалось */
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.75rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-top: 1px solid;
            transition: 0.4s;
        }

        @media (min-width: 480px) {
            .footer {
                font-size: 0.85rem;
            }
        }

        .peach-footer {
            border-top-color: #dbb6a2;
            color: #8a6252;
            animation: footerPeach 5s infinite alternate;
        }

        @keyframes footerPeach {
            0% { border-top-color: #dbb6a2; letter-spacing: 0.15em; }
            50% { border-top-color: #f0b090; letter-spacing: 0.25em; }
            100% { border-top-color: #dbb6a2; letter-spacing: 0.15em; }
        }

        .mint-footer {
            border-top-color: #8ec9c2;
            color: #2f6b66;
            animation: footerMint 6s infinite alternate;
        }

        @keyframes footerMint {
            0% { border-top-color: #8ec9c2; opacity: 0.8; }
            50% { border-top-color: #b5e7e0; opacity: 1; }
            100% { border-top-color: #8ec9c2; opacity: 0.8; }
        }

        .footer span {
            display: inline-block;
            animation: textWave 4s infinite alternate;
        }

        @keyframes textWave {
            0% { transform: translateX(0); }
            50% { transform: translateX(3px); filter: brightness(1.1); }
            100% { transform: translateX(0); }
        }

        /* разделитель */
        .divider {
            height: 4px;
            background: linear-gradient(90deg, #edd7cd, #d1e7e3, #edd7cd);
            width: 100%;
            animation: dividerMove 8s infinite;
            background-size: 200% 100%;
        }

        @keyframes dividerMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 0%; }
            100% { background-position: 0% 0%; }
        }

        /* курсоры — на мобильных скрыты (pointer-events: none уже, но убираем визуальный шум) */
        .peach-cursor, .mint-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: 0.1s ease-out, width 0.2s, height 0.2s, background 0.2s;
            mix-blend-mode: soft-light;
            will-change: left, top;
        }

        .peach-cursor {
            background: rgba(255, 190, 160, 0.4);
            border: 1px solid #fcaa8f;
            backdrop-filter: blur(2px);
            box-shadow: 0 0 30px #ffc7b1;
            animation: cursorBreath 3s infinite alternate;
        }

        .mint-cursor {
            background: rgba(140, 220, 210, 0.35);
            border: 1px solid #8dd6cf;
            backdrop-filter: blur(2px);
            box-shadow: 0 0 30px #abe2db;
            animation: cursorBreath 3s infinite alternate-reverse;
        }

        @keyframes cursorBreath {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        /* скрываем курсоры на мобильных, где нет мыши или маленький экран */
        @media (max-width: 768px), (pointer: coarse) {
            .peach-cursor, .mint-cursor {
                display: none;
            }
        }

        /* частицы и пузырьки — уменьшаем количество на мобильных (сделано через скрипт) */

        .peach-particle {
            position: absolute;
            background: #ffdbca;
            width: 4px;  /* меньше на мобильных */
            height: 4px;
            border-radius: 70% 30% 60% 40%;
            filter: blur(1.5px);
            animation: particleDrift 10s infinite linear;
            opacity: 0.2;
        }

        @media (min-width: 768px) {
            .peach-particle {
                width: 6px;
                height: 6px;
            }
        }

        @keyframes particleDrift {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.2; }
            100% { transform: translate(30px, -80px) rotate(200deg); opacity: 0; }
        }

        .bubble-mint {
            position: absolute;
            background: rgba(180, 240, 235, 0.15);
            border-radius: 50%;
            pointer-events: none;
            animation: bubbleRise 10s infinite;
            box-shadow: inset 0 0 10px #c5f7f0;
        }

        @keyframes bubbleRise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.3; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        /* дополнительные мобильные корректировки */
        @media (max-width: 480px) {
            .container {
                padding: 1rem 0.8rem;
            }
            .footer {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    
    <section class="half peach-half" id="peachHalf">
        <div class="container">
            <div class="peach-title">АНАСТАСИЯ</div>
            <div class="peach-wave">soft energy</div>

            <div class="photo-grid">
                <!-- Фото 1-4 для верхней части - исправлено: 4 фото -->
                <div class="photo-frame peach-frame"><img src="photo_2026-03-04_21-45-31.png" alt=""></div>
                <div class="photo-frame peach-frame"><img src="photo_2026-03-04_21-44-44.png" alt=""></div>

            </div>

            <div class="footer peach-footer">
                <span>✦ less perfection</span>
                <span>more authenticity ✦</span>
            </div>
        </div>
        <!-- курсор персика (скрыт на моб) -->
        <div class="peach-cursor" id="peachCursor"></div>
    </section>

    <div class="divider"></div>

    
    <section class="half mint-half" id="mintHalf">
        <div class="container">
            <div class="mint-title">АНАСТАСИЯ</div>
            <div class="mint-sub">never look back</div>

            <div class="photo-grid">
                <!-- Фото 5-8 для нижней части - также 4 шт -->
                <div class="photo-frame mint-frame"><img src="photo_2026-03-04_21-50-31.png" alt=""></div>
                <div class="photo-frame mint-frame"><img src="photo_2026-03-04_22-34-25.png" alt=""></div>

            </div>

            <div class="footer mint-footer">
                <span>✦ create yourself</span>
                <span>just me ✦</span>
            </div>
        </div>
        <div class="mint-cursor" id="mintCursor"></div>
    </section>

    <script>
        (function() {
            const peachCursor = document.getElementById('peachCursor');
            const mintCursor = document.getElementById('mintCursor');
            const peachHalf = document.getElementById('peachHalf');
            const mintHalf = document.getElementById('mintHalf');

            // проверяем, не мобильное ли устройство (но курсоры и так скрыты в CSS, но оставим логику)
            const isMobile = window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;

            if (!isMobile && peachCursor && mintCursor) {
                // движение курсоров только на десктопе
                document.addEventListener('mousemove', (e) => {
                    const y = e.clientY;
                    const half = window.innerHeight / 2;
                    
                    [peachCursor, mintCursor].forEach(c => {
                        if (!c) return;
                        c.style.left = e.clientX - 20 + 'px';
                        c.style.top = e.clientY - 20 + 'px';
                    });

                    if (y < half) {
                        peachCursor.style.opacity = '1';
                        mintCursor.style.opacity = '0';
                    } else {
                        peachCursor.style.opacity = '0';
                        mintCursor.style.opacity = '1';
                    }
                });
            }

            // частицы — меньше на мобильных
            function createPeachParticles() {
                const count = isMobile ? 8 : 18;  // меньше на мобильных
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.className = 'peach-particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = Math.random() * 100 + '%';
                    p.style.animationDelay = Math.random() * 7 + 's';
                    p.style.animationDuration = 6 + Math.random() * 10 + 's';
                    p.style.background = `rgba(255, ${190 + Math.floor(40 * Math.random())}, ${150 + Math.floor(70 * Math.random())}, 0.25)`;
                    peachHalf.appendChild(p);
                }
            }

            function createMintBubbles() {
                const count = isMobile ? 10 : 22;
                for (let i = 0; i < count; i++) {
                    const b = document.createElement('div');
                    b.className = 'bubble-mint';
                    b.style.left = Math.random() * 100 + '%';
                    b.style.width = (Math.random() * 30 + 8) + 'px';  // мельче
                    b.style.height = b.style.width;
                    b.style.animationDelay = Math.random() * 8 + 's';
                    b.style.animationDuration = 5 + Math.random() * 10 + 's';
                    mintHalf.appendChild(b);
                }
            }

            // лёгкое изменение оттенка фона — плавное, не слишком часто
            let hueShift = 0;
            setInterval(() => {
                if (!peachHalf || !mintHalf) return;
                peachHalf.style.background = `linear-gradient(145deg, ${hueShift % 2 ? '#fff3ec' : '#faddd2'} 0%, #fce6dc 100%)`;
                mintHalf.style.background = `linear-gradient(145deg, ${hueShift % 2 ? '#def0ed' : '#cbeae3'} 0%, #d4f0ea 100%)`;
                hueShift++;
            }, 4000);  // реже

            window.addEventListener('load', () => {
                createPeachParticles();
                createMintBubbles();
            });

            // адаптация при повороте экрана
            window.addEventListener('resize', function() {
                // можно пересоздать частицы при необходимости, но для простоты оставим как есть
            });
        })();
    </script>
</body>
</html>
