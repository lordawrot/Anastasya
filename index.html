<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>АНАСТАСИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #faf3f0;
            overflow-x: hidden;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* СЕКЦИИ */
        .half {
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ВЕРХНЯЯ ПОЛОВИНА — персик */
        .peach-half {
            background: linear-gradient(145deg, #fff1eb 0%, #fad9cf 100%);
            color: #4a3b36;
        }

        /* НИЖНЯЯ ПОЛОВИНА — мята */
        .mint-half {
            background: linear-gradient(145deg, #e0f2f1 0%, #c8e6e0 100%);
            color: #2b5e5a;
        }

        /* КОНТЕЙНЕР КОНТЕНТА */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
            position: relative;
            z-index: 10; /* контент выше сердечек */
            width: 100%;
        }

        /* ТИПОГРАФИЯ — без анимаций */
        .peach-title {
            font-size: clamp(2.2rem, 11vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #6d4c41;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 10px rgba(255, 215, 190, 0.6);
            word-break: break-word;
            line-height: 1.2;
        }

        .mint-title {
            font-size: clamp(2.2rem, 11vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.1em;
            color: #1d6f6b;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 15px #b0e0dd;
            line-height: 1.2;
        }

        .peach-wave {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 200;
            color: #aa7e6a;
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 2px solid #dbb6a2;
        }

        .mint-sub {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 200;
            color: #3c8d87;
            font-style: italic;
            margin-bottom: 2rem;
            padding: 0 0.5rem 0.5rem;
            border-bottom: 1px dashed #8ec9c2;
            display: inline-block;
            word-break: break-word;
        }

        /* СЕТКА ФОТО — 2 колонки */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 1.5rem 0;
            position: relative;
            z-index: 5; /* фото выше фона, но ниже контейнера */
        }

        @media (min-width: 480px) {
            .photo-grid { gap: 20px; }
        }

        /* РАМКИ (без анимаций) */
        .photo-frame {
            aspect-ratio: 3/4;
            overflow: hidden;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.15);
            position: relative;
            z-index: 15; /* фото выше сердечек */
            background: inherit; /* чтобы рамки не просвечивали */
        }

        .peach-frame {
            background: #edd7cd;
            border-radius: 16px;
            box-shadow: 0 15px 25px -10px rgba(150, 100, 70, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.7) inset;
        }

        .mint-frame {
            background: #cde3df;
            border-radius: 30% 20% 30% 20%;
            box-shadow: 0 15px 25px -15px #477a74, 0 0 0 2px #effbf9 inset;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            -webkit-user-drag: none;
            position: relative;
            z-index: 20; /* изображения выше всего */
        }

        /* ФУТЕРЫ */
        .footer {
            margin-top: 2rem;
            padding: 1.2rem 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.75rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-top: 1px solid;
            position: relative;
            z-index: 15;
        }

        @media (min-width: 480px) {
            .footer { font-size: 0.85rem; }
        }

        .peach-footer {
            border-top-color: #dbb6a2;
            color: #8a6252;
        }

        .mint-footer {
            border-top-color: #8ec9c2;
            color: #2f6b66;
        }

        /* РАЗДЕЛИТЕЛЬ */
        .divider {
            height: 4px;
            background: linear-gradient(90deg, #edd7cd, #d1e7e3, #edd7cd);
            width: 100%;
            position: relative;
            z-index: 25;
        }

        /* ========== ПАДАЮЩИЕ СЕРДЕЧКИ (теперь под контентом) ========== */
        .heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* чтобы не мешали кликам */
            z-index: 1; /* ниже всего контента (z-index контейнера 10) */
            overflow: hidden;
        }

        .heart-particle {
            position: absolute;
            font-size: 20px;
            line-height: 1;
            user-select: none;
            pointer-events: none;
            opacity: 0.5;
            filter: drop-shadow(0 0 3px rgba(255, 120, 160, 0.3));
            animation: heartFall linear infinite;
            top: -10vh;
            will-change: transform;
            /* добавляем случайный символ через before, но оставим и textContent для надежности */
        }

        /* стандартное сердечко (красное) */
        .heart-particle::before {
            display: none; /* отключаем, используем textContent */
        }

        /* анимация падения */
        @keyframes heartFall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0.5;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* мобильные корректировки */
        @media (max-width: 480px) {
            .container { padding: 1rem 0.8rem; }
            .footer { flex-direction: column; text-align: center; }
            .photo-grid { gap: 8px; }
            .heart-particle { font-size: 16px; }
        }

        /* если пользователь предпочитает минимум анимаций */
        @media (prefers-reduced-motion: reduce) {
            .heart-particle {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Контейнер для сердечек (под всем контентом) -->
    <div class="heart-container" id="heartContainer"></div>
    
    <section class="half peach-half" id="peachHalf">
        <div class="container">
            <div class="peach-title">АНАСТАСИЯ</div>
            <div class="peach-wave">C 8 марта!❤️</div>

            <div class="photo-grid">
                <div class="photo-frame peach-frame"><img src="photo_2026-03-04_21-45-31.png" alt=""></div>
                <div class="photo-frame peach-frame"><img src="photo_2026-03-04_21-44-44.png" alt=""></div>
            </div>

            <div class="footer peach-footer">
                <span>✦ less perfection</span>
                <span>more authenticity ✦</span>
            </div>
        </div>
    </section>

    <div class="divider"></div>

    <section class="half mint-half" id="mintHalf">
        <div class="container">
            <div class="mint-sub">never look back</div>

            <div class="photo-grid">
                <div class="photo-frame mint-frame"><img src="photo_2026-03-04_21-50-31.png" alt=""></div>
                <div class="photo-frame mint-frame"><img src="photo_2026-03-04_22-34-25.png" alt=""></div>
            </div>

            <div class="footer mint-footer">
                <span>✦ create yourself</span>
                <span>just me ✦</span>
            </div>
        </div>
    </section>

    <script>
        (function() {
            const heartContainer = document.getElementById('heartContainer');
            
            // Функция создания одного сердца
            function createSingleHeart() {
                if (!heartContainer) return;
                
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                
                // Выбираем случайный символ сердечка
                const symbols = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🤍'];
                // Для верхней половины больше тёплых, для нижней — холодных, но сделаем полностью случайно
                // чтобы было красиво и равномерно
                heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Случайный размер от 15 до 35px
                const size = Math.floor(Math.random() * 20) + 15;
                heart.style.fontSize = size + 'px';
                
                // Случайная позиция по горизонтали
                const left = Math.random() * 100;
                heart.style.left = left + '%';
                
                // Случайная прозрачность
                heart.style.opacity = (Math.random() * 0.5 + 0.3).toString(); // 0.3-0.8
                
                // Длительность падения
                const duration = Math.random() * 8 + 6; // 6-14 сек
                heart.style.animationDuration = duration + 's';
                
                // Небольшая задержка для естественности
                const delay = Math.random() * 2; // 0-2 сек
                heart.style.animationDelay = delay + 's';
                
                heartContainer.appendChild(heart);
                
                // Удаляем сердце после окончания анимации, чтобы не накапливались
                setTimeout(() => {
                    if (heart.parentNode) {
                        heart.remove();
                    }
                }, (duration + delay) * 1000);
            }
            
            // Создаём сердца с интервалом (по одному)
            function startHeartRain() {
                // Создаём несколько сердец сразу для заполнения, но с интервалом
                // Сначала создадим 5 штук с небольшими интервалами
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createSingleHeart();
                    }, i * 300); // каждые 300 мс
                }
                
                // Затем запускаем регулярное создание каждые 500-1500 мс
                setInterval(() => {
                    createSingleHeart();
                }, Math.random() * 1000 + 500); // случайный интервал 500-1500 мс
            }
            
            // Запускаем после загрузки DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startHeartRain);
            } else {
                startHeartRain();
            }
        })();
    </script>
</body>
</html>
